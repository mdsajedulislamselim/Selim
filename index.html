<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD SAJEDUL ISLAM SELIM | Digital Marketing Expert</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e2d5a 50%, #111827 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .main-wrapper {
            max-width: 450px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; 
            gap: 30px;
        }
        .card-container {
            background: #1a264e;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 3px solid #ffcc00; 
            text-align: center;
            /* কভার ফটোর নিচে প্যাডিং অ্যাডজাস্ট করার জন্য ভেতরের টপ প্যাডিং কমানো হয়েছে */
            padding: 0px 25px 35px 25px; 
            overflow: hidden;
        }
        
        /* 🟢 NEW: সুন্দর ফেসবুক স্টাইলের কভার ফটো সেকশন */
        .fb-cover-pic {
            width: calc(100% + 50px); /* কন্টেইনারের বর্ডারের সাথে মেলানোর জন্য */
            margin-left: -25px; /* প্যাডিং ওভাররাইড করার জন্য */
            height: 160px;
            background: linear-gradient(to bottom, rgba(255,204,0,0.2), rgba(26, 38, 78, 1)), url('https://unsplash.com') center/cover no-repeat;
            border-bottom: 2px solid #ffcc00;
            margin-bottom: -60px; /* প্রোফাইল পিকচারটি কভারের ওপর অর্ধেক ভাসিয়ে রাখার জন্য */
        }

        /* ফেসবুক লাইভ প্রোফাইল ছবির সুন্দর গোল স্টাইল */
        .fb-profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffcc00;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            margin: 0 auto 20px auto;
            display: block;
            background-color: #1a264e;
            position: relative; /* কভার ফটোর ওপরে দেখানোর জন্য */
            z-index: 2;
        }
        h1 {
            font-size: 22px;
            color: #ffffff;
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .designation {
            font-size: 14px;
            color: #ffcc00;
            font-weight: 600;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .info-box {
            text-align: left;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.04);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .info-row {
            margin-bottom: 12px;
            font-size: 14px;
            color: #cbd5e1;
            display: flex;
            align-items: flex-start;
        }
        .info-row:last-child {
            margin-bottom: 0;
        }
        .info-row strong {
            color: #ffcc00;
            width: 85px;
            flex-shrink: 0;
        }
        .info-row a {
            color: #ffffff;
            text-decoration: none;
        }
        .info-row a:hover {
            color: #ffcc00;
            text-decoration: underline;
        }
        .btn-group {
            display: flex;
            gap: 12px;
        }
        .action-btn {
            flex: 1;
            padding: 14px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s ease;
            text-align: center;
        }
        .btn-fb {
            background: #ffcc00;
            color: #1a264e;
        }
        .btn-fb:hover {
            background: #ffe066;
            transform: translateY(-2px);
        }
        .btn-hire {
            background: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
        }
        .btn-hire:hover {
            background: #ffffff;
            color: #1a264e;
            transform: translateY(-2px);
        }
        
        /* স্ক্রোল অ্যানিমেশনের জন্য CSS */
        .fade-up {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .fade-up.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="main-wrapper">

        <!-- প্রোফাইল কার্ড সেকশন -->
        <div class="card-container fade-up">
            
            <!-- 🟢 NEW: কভার ফটো ডিভ এলিমেন্ট যোগ করা হয়েছে -->
            <div class="fb-cover-pic"></div>
            
            <!-- প্রোফাইল পিকচার -->
            <img src="https://weserv.nl" alt="MD SAJEDUL ISLAM SELIM" class="fb-profile-pic">
            
            <h1>MD SAJEDUL ISLAM SELIM</h1>
            <div class="designation">Digital Marketing Expert</div>
            
            <div class="info-box">
                <div class="info-row">
                    <strong>📞 Phone:</strong> 
                    <a href="tel:+8801644924825">+8801644924825</a>
                </div>
                <div class="info-row">
                    <strong>✉️ Email:</strong> 
                    <a href="mailto:mdsajedulislamselim@gmail.com">mdsajedulislamselim@gmail.com</a>
                </div>
                <div class="info-row">
                    <strong>📍 Address:</strong> 
                    <span>Jamdani, Dhaperhat, Pirgonj, Rangpur, Bangladesh</span>
                </div>
            </div>
            
            <div class="btn-group">
                <a href="https://facebook.com" target="_blank" class="action-btn btn-fb">Facebook Profile</a>
                <a href="mailto:mdsajedulislamselim@gmail.com" class="action-btn btn-hire">Hire Me</a>
            </div>
        </div>

    </div>

    <!-- স্ক্রোল ট্র্যাকিং জাভাস্ক্রিপ্ট -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add("show");
                    }
                });
            }, {
                threshold: 0.1
            });

            document.querySelectorAll(".fade-up").forEach((el) => observer.observe(el));
        });
    </script>

</body>
</html>
