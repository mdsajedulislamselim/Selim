<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Profile Card</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e2d5a,#111827);
    padding:30px;
}

/* CARD */
.card{
    width:420px;
    background:rgba(20,30,60,0.85);
    backdrop-filter:blur(15px);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
    border:1px solid rgba(255,255,255,0.08);
}

/* COVER IMAGE (card.jpg) */
.cover{
    height:170px;
    background:url("card.jpg") center/cover no-repeat;
    position:relative;
}

/* PROFILE IMAGE (my-pic.jpg) */
.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    border:5px solid #ffcc00;
    overflow:hidden;
    position:absolute;
    bottom:-60px;
    left:50%;
    transform:translateX(-50%);
    background:#fff;
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CONTENT */
.content{
    padding:80px 25px 25px;
    text-align:center;
    color:#fff;
}

.name{
    font-size:22px;
    font-weight:700;
}

.title{
    color:#ffcc00;
    margin-top:8px;
    font-size:14px;
    letter-spacing:2px;
}

/* SOCIAL */
.social{
    display:flex;
    justify-content:center;
    gap:12px;
    margin:20px 0;
    flex-wrap:wrap;
}

.social a{
    width:40px;
    height:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    color:#fff;
    transition:.3s;
}

.social a:hover{
    background:#ffcc00;
    color:#111;
    transform:translateY(-3px);
}

/* INFO */
.info{
    text-align:left;
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
    margin-top:15px;
}

.row{
    display:flex;
    gap:10px;
    margin-bottom:10px;
    align-items:center;
}

.icon{
    width:35px;
    height:35px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,204,0,0.15);
    color:#ffcc00;
    border-radius:10px;
    flex-shrink:0;
}

.row span{
    font-size:14px;
}

/* RESPONSIVE */
@media(max-width:480px){
    .card{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="card">

    <!-- COVER (card.jpg) -->
    <div class="cover">

        <!-- PROFILE (my-pic.jpg) -->
        <div class="profile">
            <img src="my-pic.jpg" alt="">
        </div>

    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="name">MD SAJEDUL ISLAM SELIM</div>
        <div class="title">DIGITAL MARKETING EXPERT</div>

        <!-- SOCIAL -->
        <div class="social">

            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
            <a href="#"><i class="fab fa-x-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>

        </div>

        <!-- INFO -->
        <div class="info">

            <div class="row">
                <div class="icon"><i class="fa fa-phone"></i></div>
                <span>+8801644924825</span>
            </div>

            <div class="row">
                <div class="icon"><i class="fa fa-envelope"></i></div>
                <span>sajedul@example.com</span>
            </div>

            <div class="row">
                <div class="icon"><i class="fa fa-location-dot"></i></div>
                <span>Rajshahi, Bangladesh</span>
            </div>

        </div>

    </div>

</div>

</body>
</html>
