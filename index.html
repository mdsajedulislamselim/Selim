    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px 20px;
            overflow-x:hidden;
            background:
            linear-gradient(135deg,#0f172a 0%,#1e2d5a 50%,#111827 100%);
            position:relative;
        }

        /* Animated Background */
        body::before{
            content:"";
            position:absolute;
            width:500px;
            height:500px;
            background:rgba(255,204,0,0.08);
            border-radius:50%;
            top:-150px;
            left:-150px;
            filter:blur(50px);
            animation:float 8s ease-in-out infinite;
        }

        body::after{
            content:"";
            position:absolute;
            width:400px;
            height:400px;
            background:rgba(0,255,255,0.05);
            border-radius:50%;
            bottom:-120px;
            right:-120px;
            filter:blur(50px);
            animation:float2 10s ease-in-out infinite;
        }

        @keyframes float{
            0%{transform:translateY(0px);}
            50%{transform:translateY(30px);}
            100%{transform:translateY(0px);}
        }

        @keyframes float2{
            0%{transform:translateY(0px);}
            50%{transform:translateY(-30px);}
            100%{transform:translateY(0px);}
        }

        .main-wrapper{
            width:100%;
            max-width:450px;
            z-index:5;
        }

        .card-container{
            background:rgba(26,38,78,0.75);
            backdrop-filter:blur(15px);
            border:2px solid rgba(255,204,0,0.3);
            border-radius:28px;
            overflow:hidden;
            box-shadow:
            0 0 25px rgba(255,204,0,0.2),

            padding:25px;
            text-align:center;
            position:relative;
        }

        .fb-cover-pic{
            width:100%;
            height:170px;
            background:
            linear-gradient(rgba(0,0,0,.3),rgba(0,0,0,.3)),
            url('card.jpg') center/cover no-repeat;
            border-radius:18px;
            border:1px solid rgba(255,255,255,0.1);
        }

        .fb-pic-container{
            width:115px;
            height:115px;
            border-radius:50%;
            margin:-60px auto 15px;
            border:4px solid #ffcc00;
            overflow:hidden;
            background:#fff;
            box-shadow:0 8px 25px rgba(0,0,0,0.5);
        }

        .fb-pic-container img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        h1{

        .designation-container{

        #typing-text{

        }

        .social-icons{

        }

        .social-icons a{

            align-items:center;
            text-decoration:none;
            font-size:18px;

        }

        .social-icons a:hover{

            transform:translateY(-5px) scale(1.08);

        }

        .skills-section{

        }

        .skills-title{

            font-size:13px;
            margin-bottom:12px;
            text-transform:uppercase;
            font-weight:700;
            letter-spacing:1px;
        }

        .skills-container{
            display:flex;
            flex-wrap:wrap;
            gap:10px;
        }

        .skill-badge{
            padding:7px 14px;
            border-radius:30px;
            background:rgba(255,255,255,0.08);
            color:#e2e8f0;
            font-size:12px;
            border:1px solid rgba(255,255,255,0.08);
            transition:.3s;
        }

        .skill-badge:hover{
            background:#ffcc00;
            color:#111827;
            transform:translateY(-2px);
        }

        .info-box{
            background:rgba(255,255,255,0.05);
            border-radius:18px;
            padding:20px;
            text-align:left;
            margin-bottom:25px;
            border:1px solid rgba(255,255,255,0.05);
        }

        .info-row{
            display:flex;
            align-items:flex-start;
            margin-bottom:14px;
            color:#fff;
            cursor:pointer;
            transition:.3s;
        }

        .info-row:last-child{
            margin-bottom:0;
        }

        .info-row:hover{
            transform:translateX(4px);
        }

        .info-row strong{
            width:95px;
            color:#ffcc00;
            flex-shrink:0;
        }

        .info-row span{

        }

        .btn-group{

        }

        .action-btn{

        .btn-fb{

        .copy-toast{

        .whatsapp-float{

        @media(max-width:480px){

    </style>

    <script>

        /* Typing Animation */

        const texts = [
            "Digital Marketing Expert",
            "SEO Specialist",
            "Facebook Ads Expert",
            "Google Ads Specialist",
            "Lead Generation Expert"
        ];

        let count = 0;
        let index = 0;
        let currentText = "";
        let letter = "";

        (function type(){

            if(count === texts.length){
                count = 0;
            }

            currentText = texts[count];
            letter = currentText.slice(0, ++index);

            document.getElementById("typing-text").textContent = letter;

            if(letter.length === currentText.length){

                count++;

                index = 0;

                setTimeout(type, 1500);

            } else {

                setTimeout(type, 90);
            }

        })();

        /* Copy Function */

        function copyToClipboard(text, message){

            navigator.clipboard.writeText(text);

            const toast = document.getElementById("toast");

            toast.innerText = message;

            toast.style.display = "block";

            setTimeout(() => {

                toast.style.display = "none";

            }, 2000);
        }

    </script>
