<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selim | Personal Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            background: #007bff;
            color: white;
            font-size: 48px;
            line-height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            font-weight: bold;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #222;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-img">S</div>
        <h1>Welcome to Selim's Website</h1>
        <p>Hi, I am Selim. Welcome to my personal corner of the internet. Stay tuned for exciting updates!</p>
        <a href="mailto:selim80@.com" class="btn">Contact Me</a>
    </div>

</body>
</html>
