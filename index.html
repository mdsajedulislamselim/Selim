<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e2d5a,#111827);
    padding:20px;
}

/* CARD */
.card{
    width:420px;
    border-radius:28px;
    overflow:hidden;
    background:rgba(18,28,60,0.92);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 30px 70px rgba(0,0,0,0.7);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* COVER (card.jpg → red area fix) */
.cover{
    height:190px;
    background:url("card.jpg") center/cover no-repeat;
    position:relative;
}

/* PROFILE (my-pic.jpg → green area fix) */
.profile{
    width:125px;
    height:125px;
    border-radius:50%;
    border:5px solid #ffcc00;
    overflow:hidden;
    position:absolute;
    bottom:-62px;
    left:50%;
    transform:translateX(-50%);
    background:#fff;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CONTENT */
.content{
    padding:85px 22px 25px;
    text-align:center;
    color:#fff;
}

.name{
    font-size:23px;
    font-weight:700;
}

.title{
    color:#ffcc00;
    font-size:13px;
    letter-spacing:2px;
    margin-top:8px;
    min-height:18px;
}

/* SOCIAL */
.social{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin:20px 0;
}

.social a{
    width:42px;
    height:42px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    color:#fff;
    transition:.3s;
}

.social a:hover{
    background:#ffcc00;
    color:#111;
    transform:translateY(-4px) scale(1.1);
}

/* INFO BOX */
.info{
    background:rgba(255,255,255,0.05);
    padding:16px;
    border-radius:18px;
    text-align:left;
    margin-top:10px;
}

.row{
    display:flex;
    gap:12px;
    align-items:center;
    margin-bottom:12px;
    cursor:pointer;
    transition:.3s;
}

.row:hover{
    transform:translateX(6px);
}

.icon{
    width:40px;
    height:40px;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(255,204,0,0.15);
    color:#ffcc00;
}

.text b{
    color:#ffcc00;
    font-size:13px;
}

.text span{
    font-size:14px;
    color:#fff;
}

/* BUTTONS */
.btns{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.btn{
    flex:1;
    padding:12px;
    border-radius:25px;
    text-decoration:none;
    font-weight:700;
    text-align:center;
    transition:.3s;
}

.btn1{
    background:#ffcc00;
    color:#111;
}

.btn1:hover{
    transform:translateY(-3px);
    box-shadow:0 0 15px rgba(255,204,0,0.4);
}

.btn2{
    border:2px solid #fff;
    color:#fff;
}

.btn2:hover{
    background:#fff;
    color:#111;
}

/* RESPONSIVE */
@media(max-width:480px){
    .card{
        width:100%;
    }
}

/* typing animation */

function type(){

let el=document.getElementById("typing");
