    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e2d5a 50%, #111827 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .main-wrapper {
            max-width: 450px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; 
            gap: 25px;
        }
        .card-container {
            background: #1a264e;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 3px solid #ffcc00; 
            text-align: center;
            padding: 0px 25px 35px 25px;
            overflow: hidden;
        }
        
        /* ফেসবুক স্টাইলের কভার ফটো সেকশন */
        .fb-cover-pic {
            width: calc(100% + 50px);
            margin-left: -25px;
            height: 160px;
            background: linear-gradient(to bottom, rgba(255,204,0,0.1), rgba(26, 38, 78, 1)), url('https://unsplash.com') center/cover no-repeat;
            border-bottom: 2px solid #ffcc00;
            margin-bottom: -60px;
        }

        /* ফেসবুক লাইভ প্রোফাইল ছবির সুন্দর গোল স্টাইল */
        .fb-profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffcc00;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            margin: 0 auto 20px auto;
            display: block;
            background-color: #1a264e;
            position: relative;
            z-index: 2;
        }
        h1 {
            font-size: 22px;
            color: #ffffff;
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        /* ডাইনামিক টাইপিং টেক্সটের স্টাইল */
        .designation-container {
            font-size: 14px;
            color: #ffcc00;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            height: 20px;
        }
        
        /* সোশ্যাল আইকন গ্রিড স্টাইল */
        .social-icons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            padding: 0 10px;
        }
        .social-icons a {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .social-icons a:hover {
            background: #ffcc00;
            color: #1a264e;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 204, 0, 0.3);
        }

        /* স্কিল ব্যাজ স্টাইল */
        .skills-section {
            margin-bottom: 25px;
            text-align: left;
        }
        .skills-title {
            font-size: 13px;
            color: #ffcc00;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .skill-badge {
            background: rgba(255, 255, 255, 0.06);
            color: #cbd5e1;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-box {
            text-align: left;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.04);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .info-row {
            margin-bottom: 12px;
            font-size: 14px;
            color: #cbd5e1;
            display: flex;
            align-items: flex-start;
        }
        .info-row:last-child {
            margin-bottom: 0;
        }
        .info-row strong {
            color: #ffcc00;
            width: 85px;
            flex-shrink: 0;
        }
        .info-row a {
            color: #ffffff;
            text-decoration: none;
        }
        .info-row a:hover {
            color: #ffcc00;
            text-decoration: underline;
        }
        .btn-group {
            display: flex;
            gap: 12px;
        }
        .action-btn {
            flex: 1;
            padding: 14px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s ease;
            text-align: center;
        }
        .btn-fb {
            background: #ffcc00;
            color: #1a264e;
        }
        .btn-fb:hover {
            background: #ffe066;
            transform: translateY(-2px);
        }
        .btn-hire {
            background: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
        }
        .btn-hire:hover {
            background: #ffffff;
            color: #1a264e;
            transform: translateY(-2px);
        }
        
        /* স্ক্রোল অ্যানিমেশন CSS */
        .fade-up {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .fade-up.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
